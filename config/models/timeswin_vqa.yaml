# config/models/timeswin_vqa.yaml
task_type: "vqa"
dataset_name: "KoNViD-1k"

model:
  name: "TimeSwinVQA"
  freeze_backbone: false
  pretrained: true
  backbone: "swin_t"
  num_frames: 8  # 保留，需要在 Dataset 中读取
  transformer_layers: 2
  dropout: 0.3
  input_size: 224


preprocessing:
  batch_size: 1
  num_workers: 4


train:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 0.5

loss:
  mse_weight: 0.8
  rank_weight: 0.2