# config/models/resnet_vqa.yaml
task_type: "vqa"
dataset_name: "t2vqa-db"

model:
  name: "ResNetVQA"
  backbone: "resnet50"
  freeze_backbone: false
  pretrained: true
  num_frames: 8               # 视频帧数
  transformer_layers: 2       # 时序融合层数
  dropout: 0.3
  input_size: 224

preprocessing:
  batch_size: 4
  num_workers: 4

train:
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 0.5

loss:
  mse_weight: 0.8
  rank_weight: 0.2